version: "3.4"

services:
  postgres:
    image: postgres:11.7-alpine
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  sqs:
    image: s12v/elasticmq
    ports:
      - "9324:9324"
    volumes:
      - ./src/queue/local-sqs-setup.conf:/etc/elasticmq/elasticmq.conf

  migrate:
    build:
      context: .
    entrypoint: npm run db:migrate
    environment:
      - NODE_ENV=test
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=postgres
    volumes:
      - .:/psp
      - /psp/node_modules
    depends_on:
      - postgres

  psp:
    build:
      context: .
    entrypoint: ./node_modules/.bin/nodemon
    deploy:
      mode: replicated
      replicas: 3
      endpoint_mode: dnsrr
    volumes:
      - .:/psp
      - /psp/node_modules
    environment:
      - PORT=3001
      - NODE_ENV=test
      - APP_TYPE=server
      - SQS_ENDPOINT=http://sqs:9324/queue
      - SQS_CONCURRECY=10
      - PAYABLES_QUEUE=payables-queue.fifo
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=postgres
      - DATABASE_MAX_CONNECTIONS=30
      - DATABASE_MIN_CONNECTIONS=1
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      retries: 5
    depends_on:
      - postgres
      - sqs
      - migrate

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - psp
    ports:
      - "3000:3000"

  payable-worker:
    build:
      context: .
    entrypoint: ./node_modules/.bin/nodemon
    volumes:
      - .:/psp
      - /psp/node_modules
    environment:
      - NODE_ENV=test
      - SQS_ENDPOINT=http://sqs:9324/queue
      - SQS_CONCURRECY=10
      - PAYABLES_QUEUE=payables-queue.fifo
      - APP_TYPE=worker
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=postgres
      - DATABASE_MAX_CONNECTIONS=10
      - DATABASE_MIN_CONNECTIONS=1
    depends_on:
      - postgres
      - sqs
